
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KTM Vehicle System</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#eef3f8;
}

.header {
    background:linear-gradient(135deg,#163b70,#2456a4);
    color:white;
    padding:22px;
    position:sticky;
    top:0;
    z-index:999;
}

.header h1 {
    margin:0;
}

.container {
    padding:20px;
}

.search {
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-bottom:20px;
    font-size:16px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:18px;
}

.card {
    background:white;
    border-radius:18px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 5px 18px rgba(0,0,0,0.08);
    transition:0.2s;
}

.card:hover {
    transform:translateY(-4px);
}

.car-image {
    height:180px;
    background:#dce6f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.car-image img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.placeholder {
    font-size:60px;
}

.card-body {
    padding:16px;
}

.plate {
    font-size:28px;
    font-weight:bold;
    color:#163b70;
}

.brand {
    color:#666;
    margin-top:4px;
}

.driver {
    margin-top:10px;
    font-size:14px;
}

.modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.modal-content {
    background:white;
    width:90%;
    max-width:1000px;
    max-height:90vh;
    overflow:auto;
    border-radius:18px;
}

.modal-header {
    background:#163b70;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.close {
    font-size:28px;
    cursor:pointer;
}

.modal-body {
    padding:20px;
}

table {
    width:100%;
    border-collapse:collapse;
}

td {
    padding:8px;
    border-bottom:1px solid #eee;
    vertical-align:top;
}

.label {
    width:200px;
    font-weight:bold;
    color:#444;
}

.editable {
    background:#fff9d7;
}

.photo-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:14px;
    margin-top:20px;
}

.photo-box {
    border:2px dashed #bbb;
    border-radius:12px;
    padding:10px;
    text-align:center;
}

.photo-box img {
    width:100%;
    height:180px;
    object-fit:cover;
    margin-top:10px;
    border-radius:10px;
}

.photo-title {
    font-weight:bold;
    margin-bottom:8px;
}

.save-btn {
    background:#163b70;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="header">
    <h1>ฐานข้อมูลรถ KTM Steel</h1>
    <div>คลิกที่รถเพื่อดูรายละเอียด / เพิ่มรูป / แก้ไขข้อมูล</div>
</div>

<div class="container">
<button class="save-btn" style="margin-bottom:20px;" onclick="addVehicle()">
➕ เพิ่มรถใหม่
</button>

<input class="search" id="search" type="text"
placeholder="ค้นหาทะเบียน / คนขับ / รุ่นรถ"
onkeyup="searchVehicle()">

<div class="grid" id="grid"></div>

</div>

<div class="modal" id="modal">
    <div class="modal-content">

        <div class="modal-header">
            <div id="modalTitle"></div>
            <div class="close" onclick="closeModal()">×</div>
        </div>

        <div class="modal-body">

            <table id="detailTable"></table>

            <div class="photo-grid" id="photoGrid"></div>

            <button class="save-btn" onclick="saveData()">
                💾 Save Data
            </button>

        </div>

    </div>
</div>

const PHOTO_TYPES = [
    "ด้านหน้า",
    "ด้านหลัง",
    "กระบะ / พื้นที่บรรทุก",
    "ภายในรถ",
    "ด้านข้าง",
    "Dashboard / เลขไมล์"
];

let currentCar = null;

function createCard(car){
    const img = localStorage.getItem('cover_'+car.id);

    return `
    <div class="card" onclick="openModal(${car.id})">

        <div class="car-image">
            ${img
                ? `<img src="${img}">`
                : `<div class="placeholder">🚚</div>`
            }
        </div>

        <div class="card-body">

            <div class="plate">${car.RegNo || '-'}</div>

            <div class="brand">
                ${car.Brand || ''} ${car.Model || ''}
            </div>

            <div class="driver">
                👤 ${car.MainDriver || '-'}
            </div>

        </div>

    </div>
    `;
}

function render(data){
    document.getElementById("grid").innerHTML =
        data.map(createCard).join('');
}

function searchVehicle(){
    const q = document.getElementById("search").value.toLowerCase();

    const filtered = VEHICLES.filter(v =>
        JSON.stringify(v).toLowerCase().includes(q)
    );

    render(filtered);
}

function openModal(id){
    currentCar = VEHICLES.find(v=>v.id==id);

    document.getElementById("modal").style.display="flex";

    document.getElementById("modalTitle").innerHTML =
        `<h2>${currentCar.RegNo}</h2>`;

    let rows = "";

    Object.keys(currentCar).forEach(key=>{
        if(key!=="id"){
            rows += `
            <tr>
                <td class="label">${key}</td>
                <td contenteditable="true"
                    class="editable">${currentCar[key]}</td>
            </tr>
            `;
        }
    });

    document.getElementById("detailTable").innerHTML = rows;

    let photos = "";

    PHOTO_TYPES.forEach((p,index)=>{

        const imgKey = `img_${id}_${index}`;
        const img = localStorage.getItem(imgKey);

        photos += `
        <div class="photo-box">

            <div class="photo-title">${p}</div>

            <input type="file" accept="image/*"
                onchange="previewImage(event,'${imgKey}',${id},${index})">

            <img id="${imgKey}"
                 src="${img || ''}">

        </div>
        `;
    });

    document.getElementById("photoGrid").innerHTML = photos;
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

function previewImage(event,key,id,index){
    const file = event.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        localStorage.setItem(key,e.target.result);

        document.getElementById(key).src = e.target.result;

        if(index===0){
            localStorage.setItem('cover_'+id,e.target.result);
            render(VEHICLES);
        }
    }

    reader.readAsDataURL(file);
}

    alert("ข้อมูลถูกบันทึกใน Browser แล้ว");
}

render(VEHICLES);


let currentVehicleId = null;

function createPhotoBoxes(vehicleId){
    const photoGrid = document.getElementById('photoGrid');
    photoGrid.innerHTML = '';

    const photoTypes = [
        'รูปรถด้านหน้า',
        'รูปรถด้านข้าง',
        'รูปรถด้านหลัง',
        'รูปเล่มทะเบียน'
    ];

    const savedPhotos = JSON.parse(localStorage.getItem('vehiclePhotos') || '{}');

    photoTypes.forEach((title, index) => {
        const key = vehicleId + '_' + index;

        const box = document.createElement('div');
        box.className = 'photo-box';

        const titleDiv = document.createElement('div');
        titleDiv.className = 'photo-title';
        titleDiv.innerText = title;

        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';

        const img = document.createElement('img');
        img.style.display = 'none';

        if(savedPhotos[key]){
            img.src = savedPhotos[key];
            img.style.display = 'block';
        }

        input.addEventListener('change', function(e){
            const file = e.target.files[0];
            if(!file) return;

            const reader = new FileReader();

            reader.onload = function(event){
                img.src = event.target.result;
                img.style.display = 'block';

                savedPhotos[key] = event.target.result;
                localStorage.setItem('vehiclePhotos', JSON.stringify(savedPhotos));
            };

            reader.readAsDataURL(file);
        });

        box.appendChild(titleDiv);
        box.appendChild(input);
        box.appendChild(img);

        photoGrid.appendChild(box);
    });
}

const originalOpenModal = openModal;

openModal = function(id){
    originalOpenModal(id);
    currentVehicleId = id;
    createPhotoBoxes(id);
};


function addVehicle(){

    const reg = prompt("ทะเบียนรถ");
    if(!reg) return;

    const brand = prompt("ยี่ห้อรถ");
    const model = prompt("รุ่นรถ");

    const newVehicle = {
        VehicleID: reg,
        RegNo: reg,
        RegProvince: "นครราชสีมา",
        Brand: brand || "",
        Model: model || "",
        VehicleType: "รถใหม่",
        VehicleStatus: "ใช้งานปกติ",
        MainDriver: "",
        Owner: "",
        TotMileage: "",
        LastUpdate: new Date().toLocaleDateString('th-TH'),
        EquipmentCost: "0",
        RepairCost: "0",
        Accessories: "",
        RepairHistory: "",
        id: Date.now()
    };

    VEHICLES.unshift(newVehicle);

    localStorage.setItem('vehicleData', JSON.stringify(VEHICLES));

    renderVehicles(VEHICLES);

    alert("เพิ่มรถเรียบร้อย");
}

    if(saved){
        const data = JSON.parse(saved);

        VEHICLES.length = 0;

        data.forEach(v=>VEHICLES.push(v));
    }

    renderVehicles(VEHICLES);
});

const originalSaveData = saveData;

saveData = function(){

    const rows = document.querySelectorAll('#detailTable tr');

    rows.forEach(row=>{

        const label = row.querySelector('.label');
        const value = row.querySelector('[contenteditable]');

        if(label && value && currentVehicleId){

            const key = label.innerText.replace(':','').trim();

            const vehicle = VEHICLES.find(v=>v.id == currentVehicleId);

            if(vehicle){
                vehicle[key] = value.innerText;
            }
        }
    });

    localStorage.setItem('vehicleData', JSON.stringify(VEHICLES));

    alert('บันทึกข้อมูลเรียบร้อย');
}

function refreshVehicleGrid(){
    const grid = document.getElementById('grid');
    if(!grid) return;

    grid.innerHTML = '';

    VEHICLES.forEach(vehicle=>{

        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = ()=>openModal(vehicle.id);

        card.innerHTML = `
            <div class="car-image">
                <div class="placeholder">🚚</div>
            </div>

            <div class="card-body">
                <div class="plate">${vehicle.RegNo || '-'}</div>
                <div class="brand">
                    ${(vehicle.Brand || '')} ${(vehicle.Model || '')}
                </div>

                <div class="driver">
                    👨‍🔧 ${vehicle.MainDriver || '-'}
                </div>
            </div>
        `;

        grid.appendChild(card);
    });
}

window.addEventListener('load', ()=>{

    const saved = localStorage.getItem('vehicleData');

    if(saved){
        try{
            const data = JSON.parse(saved);

            VEHICLES.length = 0;

            data.forEach(v=>VEHICLES.push(v));
        }catch(e){
            console.log(e);
        }
    }

    setTimeout(()=>{
        refreshVehicleGrid();
    },300);
});
